{{ with (.Site.GetPage "/pricing/qdrant-pricing-calculator") }}
  <section class="qdrant-pricing-calculator">
    <div class="qdrant-pricing-calculator__background">
      <div class="qdrant-pricing-calculator__grid"></div>
    </div>
    <div class="container">
      <div class="qdrant-pricing-calculator__container">
        <div class="qdrant-pricing-calculator__icon">
          <svg width="76" height="64" viewBox="0 0 76 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(14, 2) rotate(-15) skewX(15) scale(1, 0.97)">
              <rect width="48" height="60" rx="6" fill="url(#calc-base-grad)"/>
              <rect x="2" y="2" width="44" height="56" rx="4" fill="url(#calc-inner-grad)" stroke="white" stroke-width="0.5"/>
              <rect x="6" y="6" width="32" height="12" rx="2" fill="url(#calc-display-grad)"/>
              <rect x="6" y="22" width="6" height="5" rx="1" fill="url(#calc-btn-active)"/>
              <rect x="15" y="22" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="24" y="22" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="33" y="22" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="6" y="29" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="15" y="29" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="24" y="29" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="33" y="29" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="6" y="36" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="15" y="36" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="24" y="36" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="6" y="43" width="14" height="5" rx="1" fill="url(#calc-btn-active2)"/>
              <rect x="24" y="43" width="6" height="5" rx="1" fill="#D4D9E6"/>
              <rect x="33" y="36" width="6" height="12" rx="1" fill="url(#calc-btn-active3)"/>
            </g>
            <defs>
              <linearGradient id="calc-base-grad" x1="24" y1="0" x2="24" y2="60" gradientUnits="userSpaceOnUse">
                <stop stop-color="#F0F3FA"/>
                <stop offset="1" stop-color="#D5DAE8"/>
              </linearGradient>
              <linearGradient id="calc-inner-grad" x1="2" y1="2" x2="46" y2="58" gradientUnits="userSpaceOnUse">
                <stop stop-color="#E1E5F0"/>
                <stop offset="1" stop-color="#FFFFFF"/>
              </linearGradient>
              <linearGradient id="calc-display-grad" x1="6" y1="6" x2="38" y2="18" gradientUnits="userSpaceOnUse">
                <stop stop-color="#B99AFF"/>
                <stop offset="1" stop-color="#FF8792"/>
              </linearGradient>
              <linearGradient id="calc-btn-active" x1="6" y1="22" x2="12" y2="27" gradientUnits="userSpaceOnUse">
                <stop stop-color="#B99AFF"/>
                <stop offset="1" stop-color="#FF8792"/>
              </linearGradient>
              <linearGradient id="calc-btn-active2" x1="6" y1="43" x2="20" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#B99AFF"/>
                <stop offset="1" stop-color="#FF8792"/>
              </linearGradient>
              <linearGradient id="calc-btn-active3" x1="33" y1="36" x2="39" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#B99AFF"/>
                <stop offset="1" stop-color="#FF8792"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="qdrant-pricing-calculator__content">
          <p class="qdrant-pricing-calculator__title">{{ .Params.title }}</p>
          <p class="qdrant-pricing-calculator__link-wrapper">
            <span class="qdrant-pricing-calculator__link-prefix">{{ .Params.linkPrefix }}</span>
            <a class="qdrant-pricing-calculator__link" href="{{ .Params.link.url }}">
              {{ .Params.link.text }}
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.33337 8H12.6667M12.6667 8L8.00004 3.33334M12.6667 8L8.00004 12.6667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          </p>
        </div>
      </div>
    </div>
  </section>
{{ end }}
