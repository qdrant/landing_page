<section class="qdrant-pricing-cta">
  <div class="qdrant-pricing-cta__background">
    <div class="qdrant-pricing-cta__stars"></div>
    <div class="qdrant-pricing-cta__globe"></div>
  </div>
  <div class="container">
    <div class="qdrant-pricing-cta__content">
      <h2 class="qdrant-pricing-cta__title">{{ .Params.title }}</h2>
      <p class="qdrant-pricing-cta__subtitle">{{ .Params.subtitle }}</p>
      {{ with .Params.button }}
        <a href="{{ .url }}" class="button button_contained button_lg qdrant-pricing-cta__button">
          {{ .text }}
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.16669 10H15.8334M15.8334 10L10 4.16666M15.8334 10L10 15.8333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      {{ end }}
    </div>
  </div>
</section>
