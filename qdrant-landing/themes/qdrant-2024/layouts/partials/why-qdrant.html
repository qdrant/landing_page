{{ with (.Site.GetPage "/headless/main/why-qdrant") }}
  <section class="why-qdrant">
    <div class="container">
      <div class="why-qdrant__header">
        <span class="why-qdrant__pill">{{ .Params.pill }}</span>
        <h2 class="why-qdrant__title">{{ .Params.title }}</h2>
        <p class="why-qdrant__subtitle">{{ .Params.subtitle }}</p>
      </div>
      <div class="why-qdrant__grid">
        {{ range .Params.featureCards }}
          <div class="why-qdrant__card why-qdrant__card--{{ .size }}" data-card-id="{{ .id }}">
            <div class="why-qdrant__card-visual why-qdrant__card-visual--{{ .id }}">
              {{ if .image }}
                <img src="{{ .image.src }}" alt="{{ .image.alt }}" class="why-qdrant__card-image" />
              {{ end }}
            </div>
            <div class="why-qdrant__card-content">
              <h3 class="why-qdrant__card-title">{{ .title }}</h3>
              <p class="why-qdrant__card-description">{{ .description | safeHTML }}</p>
              <a href="{{ .link.url }}" class="why-qdrant__card-link">
                {{ .link.text }}
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2.5 6H9.5M9.5 6L6.5 3M9.5 6L6.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>
            </div>
          </div>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
