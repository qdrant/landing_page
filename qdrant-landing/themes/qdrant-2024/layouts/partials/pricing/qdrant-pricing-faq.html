<section class="qdrant-pricing-faq">
  <div class="container">
    <h2 class="qdrant-pricing-faq__title">{{ .Params.title }}</h2>
    <div class="qdrant-pricing-faq__questions">
      {{ range $index, $element := .Params.questions }}
        <div class="qdrant-pricing-faq__item{{ if eq $index 0 }}qdrant-pricing-faq__item--active{{ end }}">
          <div class="qdrant-pricing-faq__question">
            <h6 class="qdrant-pricing-faq__question-text">{{ .question }}</h6>
            <span class="qdrant-pricing-faq__icon">
              <svg
                class="qdrant-pricing-faq__icon-plus"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M12 5V19M5 12H19"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg
                class="qdrant-pricing-faq__icon-minus"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M5 12H19"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
          </div>
          <div class="qdrant-pricing-faq__answer">
            <p class="qdrant-pricing-faq__answer-text">{{ .answer }}</p>
          </div>
        </div>
      {{ end }}
    </div>
  </div>
</section>
