name: Links

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@16361eb4acea8698b220b76c0d4e84e1fd22c61d # v2.6.0
        with:
          hugo-version: "0.160.1"
      - name: Install npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Run hugo
        run: |
          bash -x ./install-and-build.sh
          CURRENT_DIR=$(pwd)
          export PATH="${CURRENT_DIR}/dart-sass:${PATH}"
          cd qdrant-landing
          hugo --gc -b 'http://localhost:1314'
          hugo serve --port 1314 &
          for i in {1..60}; do
            curl -sf http://localhost:1314/ >/dev/null && break
            sleep 1
          done
      - name: Internal Links Check
        id: lychee
        uses: lycheeverse/lychee-action@ec3ed119d4f44ad2673a7232460dc7dff59d2421 # v1.8.0
        with:
          args: --max-redirects 0 --exclude '.*' --include '^http://localhost:1314/[^%]+$' --base http://localhost:1314/ qdrant-landing/public/
          fail: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
